    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
      - redis
    networks:
      - bioaestheticax1_network
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: npm run dev

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bioaestheticax1_frontend
    user: "0:0"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
      - HOSTNAME=0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - bioaestheticax1_network
    command: npm run dev

  # Adminer for database management
  adminer:
    image: adminer:4.8.1
    container_name: bioaestheticax1_adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - bioaestheticax1_network

  # MinIO for S3-compatible storage (local development)
  minio:
    image: minio/minio:latest
    container_name: bioaestheticax1_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - bioaestheticax1_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  bioaestheticax1_network:
    driver: bridge
