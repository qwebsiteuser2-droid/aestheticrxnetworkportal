version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: bioaestheticax1_db
    environment:
      POSTGRES_DB: bioaestheticax1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - bioaestheticax1_network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: bioaestheticax1_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bioaestheticax1_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bioaestheticax1_backend
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:password@db:5432/bioaestheticax1
      - REDIS_URL=redis://redis:6379
