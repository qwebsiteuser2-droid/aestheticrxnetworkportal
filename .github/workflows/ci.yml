name: CI

on: [push, pull_request]

jobs:
  backend:
    name: Backend (type-check, lint, unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests (no DB required)
        run: npm run test:unit -- --passWithNoTests
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-not-used-in-production
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test

  frontend:
    name: Frontend (type-check, lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://placeholder-for-ci-build.example.com
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: placeholder
