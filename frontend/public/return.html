<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - BioAestheticAx Network</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .success-icon {
            font-size: 80px;
            color: #27ae60;
            margin-bottom: 20px;
        }

        .success-title {
            color: #333;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .success-message {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .order-details {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .detail-row:last-child {
            margin-bottom: 0;
            font-weight: bold;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✅</div>
        <h1 class="success-title">Payment Successful!</h1>
        <p class="success-message">
            Thank you for your purchase! Your payment has been processed successfully and your order is being prepared.
        </p>

        <div class="order-details">
            <div class="detail-row">
                <span>Order Number:</span>
                <span>#000001</span>
            </div>
            <div class="detail-row">
                <span>Payment Amount:</span>
                <span>R1,670.00</span>
            </div>
            <div class="detail-row">
                <span>Payment Status:</span>
                <span>Completed</span>
            </div>
            <div class="detail-row">
                <span>Transaction Date:</span>
                <span id="transactionDate"></span>
            </div>
        </div>

        <div class="action-buttons">
            <a href="/" class="btn btn-primary">Continue Shopping</a>
            <a href="/orders" class="btn btn-secondary">View Orders</a>
        </div>
    </div>

    <script>
        // Set current date
        document.getElementById('transactionDate').textContent = new Date().toLocaleDateString();
        
        // Get URL parameters for order details
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');
        const amount = urlParams.get('amount');
        
        if (orderId) {
            document.querySelector('.detail-row:nth-child(1) span:last-child').textContent = '#' + orderId;
        }
        
        if (amount) {
            document.querySelector('.detail-row:nth-child(2) span:last-child').textContent = 'R' + parseFloat(amount).toFixed(2);
        }
    </script>
</body>
</html>
