<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - AestheticRxNetwork</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .checkout-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .checkout-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .checkout-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .order-number {
            color: #666;
            font-size: 16px;
        }

        .order-items {
            margin-bottom: 20px;
        }

        .order-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .item-image {
            width: 60px;
            height: 60px;
            background: #f0f0f0;
            border-radius: 8px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .item-price {
            color: #666;
            font-size: 14px;
        }

        .order-summary {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .summary-row.total {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            border-top: 2px solid #ddd;
            padding-top: 10px;
            margin-top: 10px;
        }

        .pay-button {
            width: 100%;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .pay-button:hover {
            background: #c0392b;
        }

        .pay-button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #e74c3c;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <div class="checkout-header">
            <h1>Checkout Demo</h1>
            <div class="order-number">Order #000001</div>
        </div>

        <div class="order-items">
            <div class="order-item">
                <div class="item-image">👟</div>
                <div class="item-details">
                    <div class="item-name">Product 1</div>
                    <div class="item-price">R1,100.00</div>
                </div>
            </div>
            <div class="order-item">
                <div class="item-image">🧢</div>
                <div class="item-details">
                    <div class="item-name">Product 2</div>
                    <div class="item-price">R280.00</div>
                </div>
            </div>
            <div class="order-item">
                <div class="item-image">🎒</div>
                <div class="item-details">
                    <div class="item-name">Product 3</div>
                    <div class="item-price">R200.00</div>
                </div>
            </div>
        </div>

        <div class="order-summary">
            <div class="summary-row">
                <span>Shipping</span>
                <span>R90.00</span>
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <span>R1,670.00</span>
            </div>
        </div>

        <button class="pay-button" onclick="initiatePayment()">
            PAY NOW
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Processing payment...</div>
        </div>
    </div>

    <script>
        async function initiatePayment() {
            const button = document.querySelector('.pay-button');
            const loading = document.getElementById('loading');
            
            button.disabled = true;
            loading.style.display = 'block';

            try {
                // Create order data
                const orderData = {
                    orderIds: ['order-000001'],
                    items: [
                        { name: 'Product 1', price: 1100.00, quantity: 1 },
                        { name: 'Product 2', price: 280.00, quantity: 1 },
                        { name: 'Product 3', price: 200.00, quantity: 1 }
                    ],
                    shipping: 90.00,
                    total: 1670.00
                };

                // Call backend to initialize PayFast payment
                const response = await fetch('/api/payments/test/payfast/initialize', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(orderData)
                });

                if (!response.ok) {
                    throw new Error('Failed to initialize payment');
                }

                const result = await response.json();
                
                if (result.success && result.paymentUrl) {
                    // Redirect to PayFast
                    window.location.href = result.paymentUrl;
                } else {
                    throw new Error(result.message || 'Payment initialization failed');
                }

            } catch (error) {
                console.error('Payment error:', error);
                alert('Payment initialization failed: ' + error.message);
                button.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
